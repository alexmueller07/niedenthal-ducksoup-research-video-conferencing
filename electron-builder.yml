appId: edu.wisc.niedenthal.labvideocall
productName: Lab Video Call
copyright: Copyright © 2026 Niedenthal Lab, UW–Madison
directories:
  output: dist
  buildResources: resources
files:
  - from: .
    filter:
      - package.json
      - app
win:
  target:
    - nsis
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Lab Video Call
  artifactName: Lab-Video-Call-Setup-${version}.${ext}
mac:
  category: public.app-category.education
  icon: resources/icon.icns
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  artifactName: Lab-Video-Call-${version}-${arch}.${ext}
  # macOS denies camera/mic access unless these usage strings are present in
  # Info.plist. This is a video-call app, so they are required or no video/audio
  # device prompt ever appears and getUserMedia fails silently.
  extendInfo:
    NSCameraUsageDescription: Lab Video Call uses the camera for the research video call.
    NSMicrophoneUsageDescription: Lab Video Call uses the microphone for the research video call.
  # Camera/mic entitlements travel with the (ad-hoc) signature. Repeated
  # permission prompts across REinstalls are inherent to unsigned builds —
  # macOS ties the TCC grant to the code signature, and ad-hoc signatures
  # change per build. A Developer ID certificate is the permanent fix; these
  # entitlements make sure a signed build works unchanged.
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
publish: null
