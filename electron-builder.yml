appId: edu.wisc.niedenthal.labvideocall
productName: Lab Video Call
copyright: Copyright © 2026 Niedenthal Emotions Lab, UW–Madison
directories:
  output: dist
  buildResources: resources
files:
  - from: .
    filter:
      - package.json
      - app
win:
  target:
    - nsis
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Lab Video Call
  artifactName: Lab-Video-Call-Setup-${version}.${ext}
publish: null
